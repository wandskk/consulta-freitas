<!DOCTYPE html>
<html lang="pt-BR">
  <body>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>

    <script>
      function drawIcon(canvas, size) {
        const ctx = canvas.getContext('2d')

        ctx.fillStyle = '#09090b'
        ctx.beginPath()
        ctx.roundRect(0, 0, size, size, size * 0.22)
        ctx.fill()

        const padding = size * 0.25
        const boxSize = size - padding * 2

        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.roundRect(padding, padding, boxSize, boxSize, size * 0.08)
        ctx.fill()

        ctx.fillStyle = '#09090b'
        ctx.fillRect(size * 0.34, size * 0.4, size * 0.32, size * 0.06)
        ctx.fillRect(size * 0.34, size * 0.52, size * 0.25, size * 0.06)
        ctx.fillRect(size * 0.34, size * 0.64, size * 0.18, size * 0.05)
      }

      drawIcon(document.getElementById('canvas192'), 192)
      drawIcon(document.getElementById('canvas512'), 512)
    </script>
  </body>
</html>
